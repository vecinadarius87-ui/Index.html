    /* ============================================================
       CSS CUSTOM PROPERTIES — Design Token System
       ============================================================ */
    :root {
      --bg-base:       #0D0F0F;
      --bg-surface:    #111414;
      --bg-elevated:   #161A1A;
      --bg-card:       #131717;

      --accent-emerald: #00FF87;
      --accent-blue:    #00C9FF;
      --accent-glow-em: rgba(0, 255, 135, 0.18);
      --accent-glow-bl: rgba(0, 201, 255, 0.18);

      --text-primary:   #F0F0F0;
      --text-secondary: #9A9A9A;
      --text-muted:     #555;
      --text-accent:    #00FF87;

      --border:         rgba(255,255,255,0.07);
      --border-accent:  rgba(0,255,135,0.3);

      --radius-sm:  6px;
      --radius-md:  12px;
      --radius-lg:  20px;

      --font-display: 'Space Grotesk', sans-serif;
      --font-body:    'Inter', sans-serif;
      --font-mono:    'JetBrains Mono', monospace;

      --nav-h: 70px;
      --max-w: 1200px;
      --section-pad: 120px 24px;

      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* ============================================================
       RESET & BASE
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      scroll-behavior: smooth;
      font-size: 16px;
    }

    body {
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-body);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    ::selection { background: var(--accent-emerald); color: #000; }

    a { color: inherit; text-decoration: none; }

    img { display: block; width: 100%; }

    /* Reduce motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    /* ============================================================
       SCROLLBAR
       ============================================================ */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-base); }
    ::-webkit-scrollbar-thumb { background: var(--accent-emerald); border-radius: 3px; }

    /* ============================================================
       UTILITY CLASSES
       ============================================================ */

      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 24px;
    }

      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: var(--accent-emerald);
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .section-label::before {
      content: '';
      display: block;
      width: 24px;
      height: 1px;
      background: var(--accent-emerald);
    }

    .section-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      margin-bottom: 16px;
    }

    .section-subtitle {
      font-size: 1.05rem;
      color: var(--text-secondary);
      max-width: 560px;
      line-height: 1.7;
    }

      font-family: var(--font-display);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s var(--ease-out-expo);
      border: none;
      letter-spacing: 0.01em;
    }

      background: var(--accent-emerald);
      color: #000;
    }
